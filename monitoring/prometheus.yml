# Prometheus Configuration for Portfolio Monitoring
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'nginx-exporter'
    static_configs:
      - targets: ['nginx-exporter:9113']
        labels:
          service: 'portfolio-lb'

  - job_name: 'portfolio-health'
    scrape_interval: 30s
    metrics_path: /health
    static_configs:
      - targets:
          - 'portfolio-1:80'
          - 'portfolio-2:80'
          - 'portfolio-3:80'
        labels:
          service: 'portfolio-app'

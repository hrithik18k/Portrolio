# ═══════════════════════════════════════════════════════════
#  Load Balancer Configuration — Round Robin with Health
# ═══════════════════════════════════════════════════════════

worker_processes auto;
worker_rlimit_nofile 65535;
pid /tmp/nginx.pid;

error_log /var/log/nginx/error.log warn;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──
    log_format lb '$remote_addr -> $upstream_addr [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  'rt=$request_time uct=$upstream_connect_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log lb buffer=32k flush=5m;

    # ── Performance ──
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # ── Compression ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # ── Rate Limiting ──
    limit_req_zone $binary_remote_addr zone=api:10m rate=50r/s;
    limit_conn_zone $binary_remote_addr zone=perip:10m;

    # ── Upstream — Load Balanced Application Servers ──
    upstream portfolio_backend {
        # Load balancing method: least connections
        # Sends new requests to the server with fewest active connections
        least_conn;

        # Application server replicas
        server portfolio-1:80 max_fails=3 fail_timeout=30s weight=1;
        server portfolio-2:80 max_fails=3 fail_timeout=30s weight=1;
        server portfolio-3:80 max_fails=3 fail_timeout=30s weight=1;

        # Keep-alive connections to upstream
        keepalive 32;
    }

    # ── Temp paths for non-root ──
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;

    server {
        listen 80;
        server_name _;

        # ── Security ──
        server_tokens off;

        # ── Rate Limiting ──
        limit_req zone=api burst=30 nodelay;
        limit_conn perip 100;

        # ── Load Balancer Health Check ──
        location /lb-health {
            access_log off;
            return 200 '{"status":"healthy","role":"load-balancer","upstreams":3}';
            add_header Content-Type application/json;
        }

        # ── Nginx Status for Monitoring ──
        location /lb-status {
            stub_status;
            access_log off;
            allow 172.0.0.0/8;
            allow 10.0.0.0/8;
            allow 127.0.0.1;
            deny all;
        }

        # ── Proxy to Application Servers ──
        location / {
            proxy_pass http://portfolio_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Forward headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;

            # Buffering
            proxy_buffer_size          128k;
            proxy_buffers              4 256k;
            proxy_busy_buffers_size    256k;

            # Failover — try next upstream on error
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 10s;

            # Custom response headers
            add_header X-Served-By $upstream_addr always;
            add_header X-Request-ID $request_id always;
            add_header X-Load-Balanced "true" always;
        }
    }
}
